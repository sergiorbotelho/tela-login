<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <main>
        <h1>Criar Conta</h1>
        <div class="social-media">
            <a href="#">
                <img src="assets/google.png" alt="Google">
            </a>
            <a href="#">
                <img src="assets/facebook.png" alt="Facebook">
            </a>
            <a href="#">
                <img src="assets/linkedin.png" alt="Linkedin">
            </a>
        </div>

        <div class="alternative">
            <span>OU</span>
        </div>

        <form action="">
            <label for="nome">
                <span>Nome</span>
                <input type="text" id="nome" name="nome" placeholder="Ex. Sergio">
            </label>

            <label for="email">
                <span>E-mail</span>
                <input type="email" id="email" name="email" placeholder="Ex. email@dominio.com">
            </label>

            <label for="senha">
                <span>Senha</span>
                <input type="password" id="senha" name="senha" >
            </label>

            <label for="senha">
                <span>Repita a senha</span>
                <input type="password" id="senha" name="senha">
            </label>

            <input type="submit" value="Inscrever-se" id="button">
        </form>
    </main>
    <section class="images">
        <img src="assets/authentication_fsn5.svg" alt="Authentication_Sign-UP">
        <div class="circle"></div>
    </section>
</body>
</html>
